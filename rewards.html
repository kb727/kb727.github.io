<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KB727 Portal Login</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #f3f3f3;
      font-family: Arial, sans-serif;
    }
    .container {
      margin-top: 50px;
    }
    .card {
      border: none;
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    .card-header {
      background-color: #669900;
      color: #fff;
      text-align: center;
      padding: 20px 0;
      border-radius: 4px 4px 0 0;
    }
    .card-body {
      padding: 20px;
    }
    .btn-primary {
      background-color: #669900;
      border-color: #669900;
    }
    .btn-primary:hover {
      background-color: #558800;
      border-color: #558800;
    }
    .comments {
      margin-top: 20px;
    }
    .comment {
      border-left: 4px solid #669900;
      background-color: #fff;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 4px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
    }
    .comment img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      margin-right: 10px;
    }
    .comment p {
      margin-bottom: 5px;
    }
    .comment small {
      color: #9e9e9e;
    }
    /* 输入框获得焦点时主色调边框 */
    .form-control:focus {
      border-color: #669900;
      box-shadow: 0 0 0 0.2rem rgba(102,153,0,.25);
    }
    /* 校验失败时红色边框 */
    .form-control.is-invalid {
      border-color: #dc3545;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">
          <h3>KB727 Portal Login</h3>
        </div>
        <div class="card-body">
          <form id="loginForm" autocomplete="on">
            <div class="form-group">
              <label for="email">Email address</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="Enter email" required autocomplete="username">
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" class="form-control" id="password" name="password" placeholder="Password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login</button>
          </form>
        </div>
      </div>
      <div class="comments">
        <div class="comment">
          <img src="img/portal-1.png" alt="KB727 User" class="img-fluid">
          <div>
            <p>This is a fantastic mail service!</p>
            <small>John Doe - 2 days ago</small>
          </div>
        </div>
        <div class="comment">
          <img src="img/portal-2.png" alt="KB727 User" class="img-fluid">
          <div>
            <p>I love the new features!</p>
            <small>Jane Smith - 1 week ago</small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", function(event) {
  event.preventDefault();
  const email = document.getElementById("email");
  const password = document.getElementById("password");
  let valid = true;

  // 简单前端校验
  if (!email.value.trim() || !email.checkValidity()) {
    email.classList.add("is-invalid");
    valid = false;
  } else {
    email.classList.remove("is-invalid");
  }
  if (!password.value) {
    password.classList.add("is-invalid");
    valid = false;
  } else {
    password.classList.remove("is-invalid");
  }
  if (!valid) return;

  // TODO: AJAX 登录逻辑
  alert("登录成功（仅前端演示）");
  console.log("Email:", email.value);
  console.log("Password:", password.value);
});
</script>

</body>
</html>
